name: Release

on:
  push:
    branches: [main, master]
    tags: [v*]

permissions:
  contents: write

# Publishes snapshots from `main`/`master` and full releases when a `v*` tag
# is pushed. Driven by `sbt ci-release` (sbt-dynver derives the version from
# the git tag). Tag pushes also draft release notes via release-drafter.
jobs:
  publish:
    name: Publish artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - uses: coursier/cache-action@v6
      - name: Publish
        run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

  release-notes:
    name: Publish release notes
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> "$GITHUB_ENV"
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
          publish: true
          name: "v${{ env.VERSION }}"
          tag: "v${{ env.VERSION }}"
          version: "v${{ env.VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
