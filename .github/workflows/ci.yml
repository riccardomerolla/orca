name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: sbt/setup-sbt@v1
      - uses: coursier/cache-action@v6
      - run: sbt +test

  integration:
    runs-on: ubuntu-latest
    if: ${{ vars.ORCA_INTEGRATION == 'true' }}
    env:
      ORCA_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: sbt/setup-sbt@v1
      - uses: coursier/cache-action@v6
      - run: sbt +test
